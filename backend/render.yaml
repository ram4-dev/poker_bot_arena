services:
  - type: web
    name: bot-arena-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./bot_arena.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
