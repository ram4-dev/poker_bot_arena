services:
  - type: web
    name: bot-arena-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bot-arena-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bot-arena.vercel.app
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: bot-arena-db
    region: oregon
    plan: free
    databaseName: bot_arena
    user: bot_arena_user
